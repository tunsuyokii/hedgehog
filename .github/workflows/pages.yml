name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "frontend/**"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static artifact
        run: |
          mkdir -p _site
          if [ -d "frontend/dist" ]; then cp -r frontend/dist/* _site/; fi
          if [ -d "docs" ]; then cp -r docs/* _site/; fi
          if [ ! -f "_site/index.html" ]; then echo "<h1>Pages artifact is empty</h1>" > _site/index.html; fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
