<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ёжик был тут</title>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .screen {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      color: #fff;
    }
    .icon {
      width: 84px;
      height: 84px;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.35));
    }
    .label {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="screen">
    <img class="icon" src="./hedgehog.svg" alt="Иконка ёжика" />
    <div class="label">Ёжик был тут</div>
  </main>
</body>
</html>
