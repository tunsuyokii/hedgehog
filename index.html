<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Крутые аналитики</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #4c1231;
        background: #ffd7e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, #fff5fb 0 12rem, transparent 12rem),
          linear-gradient(135deg, #ffd7e8 0%, #ff9fcc 100%);
      }

      main {
        width: min(92vw, 42rem);
        padding: clamp(2rem, 6vw, 3rem);
        border: 0.25rem solid rgba(255, 255, 255, 0.8);
        border-radius: 2rem;
        background: rgba(255, 244, 250, 0.88);
        box-shadow: 0 1.5rem 4rem rgba(139, 24, 84, 0.24);
        text-align: center;
      }

      .hedgehog-scene {
        position: relative;
        width: min(100%, 34rem);
        min-height: clamp(9rem, 28vw, 12rem);
        margin: 0 auto 1.5rem;
        overflow: hidden;
        border: 0.18rem solid rgba(236, 63, 148, 0.18);
        border-radius: 1.75rem;
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.82) 0 2.7rem, transparent 2.8rem),
          linear-gradient(180deg, #fff7fc 0 62%, #ffd0e5 62% 100%);
        box-shadow: inset 0 -0.5rem 1.5rem rgba(236, 63, 148, 0.12);
      }

      .hedgehog-scene::before {
        content: "";
        position: absolute;
        inset: auto 1.5rem 1.15rem;
        height: 0.35rem;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, rgba(140, 42, 91, 0.28), transparent);
      }

      .runner,
      .rolling-apple {
        position: absolute;
        z-index: 1;
      }

      .runner {
        left: clamp(0.6rem, 4vw, 2rem);
        bottom: clamp(1.05rem, 3vw, 1.45rem);
        width: clamp(9.5rem, 34vw, 13rem);
        animation:
          hedgehog-bob 420ms ease-in-out infinite alternate,
          hedgehog-chase 2.8s ease-in-out infinite;
        filter: drop-shadow(0 0.9rem 0.7rem rgba(139, 24, 84, 0.18));
      }

      .rolling-apple {
        left: clamp(10.5rem, 42vw, 15.4rem);
        bottom: clamp(2.1rem, 6vw, 3rem);
        width: clamp(2.4rem, 10vw, 3.5rem);
        animation: apple-escape 2.8s linear infinite;
        filter: drop-shadow(0 0.45rem 0.35rem rgba(139, 24, 84, 0.18));
      }

      .rolling-apple svg {
        animation: apple-roll 700ms linear infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      .runner svg,
      .rolling-apple svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .runner-leg {
        animation: leg-dash 420ms ease-in-out infinite alternate;
        transform-box: fill-box;
        transform-origin: top center;
      }

      .runner-leg:nth-of-type(2n) {
        animation-direction: alternate-reverse;
      }

      .speed-line {
        position: absolute;
        z-index: 0;
        left: 4%;
        height: 0.18rem;
        border-radius: 999px;
        background: rgba(236, 63, 148, 0.28);
        animation: speed-line 1s linear infinite;
      }

      .speed-line.one {
        top: 33%;
        width: 4.6rem;
      }

      .speed-line.two {
        top: 48%;
        width: 3.2rem;
        animation-delay: 330ms;
      }

      .speed-line.three {
        top: 62%;
        width: 5.4rem;
        animation-delay: 650ms;
      }

      @keyframes hedgehog-bob {
        from {
          transform: translateY(0) rotate(-1deg);
        }

        to {
          transform: translateY(-0.35rem) rotate(1deg);
        }
      }

      @keyframes hedgehog-chase {
        0%,
        100% {
          margin-left: 0;
        }

        45% {
          margin-left: 0.85rem;
        }

        70% {
          margin-left: 0.2rem;
        }
      }

      @keyframes apple-escape {
        0% {
          transform: translateX(-0.4rem);
        }

        78% {
          transform: translateX(clamp(7rem, 24vw, 12rem));
        }

        100% {
          transform: translateX(clamp(7rem, 24vw, 12rem));
        }
      }

      @keyframes apple-roll {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes leg-dash {
        from {
          transform: rotate(10deg);
        }

        to {
          transform: rotate(-13deg);
        }
      }

      @keyframes speed-line {
        from {
          transform: translateX(-2rem);
          opacity: 0;
        }

        20%,
        70% {
          opacity: 1;
        }

        to {
          transform: translateX(26rem);
          opacity: 0;
        }
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 8vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 2rem;
        color: #8c2a5b;
        font-size: 1.1rem;
      }

      .counter-panel {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 1rem 1.4rem;
        background: #ec3f94;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        box-shadow: 0 0.7rem 1.5rem rgba(236, 63, 148, 0.35);
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          background 140ms ease;
      }

      button:hover {
        background: #d92d82;
        transform: translateY(-0.12rem);
        box-shadow: 0 0.9rem 1.8rem rgba(217, 45, 130, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button:focus-visible {
        outline: 0.25rem solid #fff;
        outline-offset: 0.2rem;
      }

      .count-card {
        min-width: 9.5rem;
        padding: 0.8rem 1rem;
        border-radius: 1.25rem;
        background: #fff;
        color: #a41462;
        font-weight: 800;
        box-shadow: inset 0 0 0 0.12rem rgba(236, 63, 148, 0.16);
      }

      .count-card span {
        display: block;
      }

      #analyst-count {
        margin-top: 0.1rem;
        font-size: 2.5rem;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="page-title">
      <div class="hedgehog-scene" aria-label="Ёжик бежит за яблоком, которое укатывается от него" role="img">
        <span class="speed-line one" aria-hidden="true"></span>
        <span class="speed-line two" aria-hidden="true"></span>
        <span class="speed-line three" aria-hidden="true"></span>
        <div class="runner" aria-hidden="true">
          <svg viewBox="0 0 180 150" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g stroke="#5f2b41" stroke-width="6" stroke-linecap="round">
              <line x1="48" y1="70" x2="31" y2="46"/>
              <line x1="61" y1="62" x2="54" y2="34"/>
              <line x1="77" y1="59" x2="80" y2="31"/>
              <line x1="94" y1="61" x2="108" y2="36"/>
              <line x1="108" y1="68" x2="133" y2="49"/>
            </g>
            <g>
              <path d="M83 55C83 44 90 37 99 37C108 37 115 44 115 55H83Z" fill="#e23d57" stroke="#5f2b41" stroke-width="5" stroke-linejoin="round"/>
              <path d="M94 55H105L109 83H90L94 55Z" fill="#ffe3c4" stroke="#5f2b41" stroke-width="5" stroke-linejoin="round"/>
              <circle cx="94" cy="47" r="3.5" fill="#fff8f1"/>
              <circle cx="105" cy="45" r="3" fill="#fff8f1"/>
              <circle cx="110" cy="52" r="2.5" fill="#fff8f1"/>
            </g>
            <path d="M37 92C37 70 57 55 84 55C110 55 130 71 132 93C128 112 111 122 84 122C58 122 40 112 37 92Z" fill="#fff8fb" stroke="#5f2b41" stroke-width="6"/>
            <ellipse cx="123" cy="95" rx="28" ry="20" fill="#fff8fb" stroke="#5f2b41" stroke-width="6"/>
            <circle cx="131" cy="89" r="4" fill="#5f2b41"/>
            <circle cx="149" cy="96" r="3.5" fill="#5f2b41"/>
            <path d="M135 110C130 117 119 121 106 119" stroke="#5f2b41" stroke-width="5" stroke-linecap="round"/>
            <g stroke="#5f2b41" stroke-width="5" stroke-linecap="round">
              <line class="runner-leg" x1="62" y1="118" x2="46" y2="134"/>
              <line class="runner-leg" x1="82" y1="121" x2="96" y2="138"/>
              <line class="runner-leg" x1="110" y1="118" x2="96" y2="134"/>
              <line class="runner-leg" x1="129" y1="111" x2="143" y2="126"/>
            </g>
          </svg>
        </div>
        <div class="rolling-apple" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M33 12C33 7 36 4 41 4" stroke="#5f2b41" stroke-width="5" stroke-linecap="round"/>
            <path d="M34 15C40 7 50 11 52 19C45 22 38 20 34 15Z" fill="#6fba57" stroke="#5f2b41" stroke-width="4" stroke-linejoin="round"/>
            <path d="M32 19C42 9 57 20 55 37C53 53 42 60 32 54C22 60 11 53 9 37C7 20 22 9 32 19Z" fill="#f0445f" stroke="#5f2b41" stroke-width="5" stroke-linejoin="round"/>
            <path d="M22 25C18 30 17 37 20 43" stroke="#ff9cac" stroke-width="4" stroke-linecap="round"/>
            <circle cx="40" cy="32" r="4" fill="#ff9cac"/>
          </svg>
        </div>
      </div>
      <h1 id="page-title">Крутые аналитики</h1>
      <p>Нажимай кнопку и пополняй розовый счётчик.</p>
      <section class="counter-panel" aria-label="Счётчик крутых аналитиков">
        <button id="analyst-button" type="button">Я крутой аналитик</button>
        <output class="count-card" for="analyst-button">
          <span>Счётчик</span>
          <span id="analyst-count">0</span>
        </output>
      </section>
    </main>

    <script>
      const analystButton = document.querySelector("#analyst-button");
      const analystCount = document.querySelector("#analyst-count");
      let count = 0;

      analystButton.addEventListener("click", () => {
        count += 1;
        analystCount.textContent = count;
      });
    </script>
  </body>
</html>
