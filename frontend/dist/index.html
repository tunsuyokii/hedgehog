<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Крутые аналитики</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #4c1231;
        background: #ffd7e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, #fff5fb 0 12rem, transparent 12rem),
          linear-gradient(135deg, #ffd7e8 0%, #ff9fcc 100%);
      }

      main {
        width: min(92vw, 42rem);
        padding: 3rem;
        border: 0.25rem solid rgba(255, 255, 255, 0.8);
        border-radius: 2rem;
        background: rgba(255, 244, 250, 0.86);
        box-shadow: 0 1.5rem 4rem rgba(139, 24, 84, 0.24);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 8vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 2rem;
        color: #8c2a5b;
        font-size: 1.1rem;
      }

      .counter-panel {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 1rem 1.4rem;
        background: #ec3f94;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        box-shadow: 0 0.7rem 1.5rem rgba(236, 63, 148, 0.35);
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          background 140ms ease;
      }

      button:hover {
        background: #d92d82;
        transform: translateY(-0.12rem);
        box-shadow: 0 0.9rem 1.8rem rgba(217, 45, 130, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button:focus-visible {
        outline: 0.25rem solid #fff;
        outline-offset: 0.2rem;
      }

      .count-card {
        min-width: 9.5rem;
        padding: 0.8rem 1rem;
        border-radius: 1.25rem;
        background: #fff;
        color: #a41462;
        font-weight: 800;
        box-shadow: inset 0 0 0 0.12rem rgba(236, 63, 148, 0.16);
      }

      .count-card span {
        display: block;
      }

      #analyst-count {
        margin-top: 0.1rem;
        font-size: 2.5rem;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="page-title">
      <h1 id="page-title">Крутые аналитики</h1>
      <p>Нажимай кнопку и пополняй розовый счётчик.</p>
      <section class="counter-panel" aria-label="Счётчик крутых аналитиков">
        <button id="analyst-button" type="button">Я крутой аналитик</button>
        <output class="count-card" for="analyst-button">
          <span>Счётчик</span>
          <span id="analyst-count">0</span>
        </output>
      </section>
    </main>

    <script>
      const analystButton = document.querySelector("#analyst-button");
      const analystCount = document.querySelector("#analyst-count");
      let count = 0;

      analystButton.addEventListener("click", () => {
        count += 1;
        analystCount.textContent = count;
      });
    </script>
  </body>
</html>
